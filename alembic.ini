# ============================================================
# Alembic — Configuração de Migrações do Menu.AI
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# URL do banco — sobrescrita pelo env.py via DATABASE_URL do .env
sqlalchemy.url = postgresql://menuai:menuai123@localhost:5432/menuai_db

# Formato dos arquivos de versão
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Codificação padrão
output_encoding = utf-8

# ============================================================
[post_write_hooks]
# (hooks opcionais — ex: black formatter)

# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
